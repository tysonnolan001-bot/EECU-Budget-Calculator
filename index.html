<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wise-Up Budget Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<nav>
    <img src="images/Wise-Up Budget Calculator.png">
</nav>

<body>
    <main>
       
        <section class="chart-section">
            <!-- Add chart later -->
            <section id="chart-legend">
                <ul id="legend-items">
                    <li class="legend-item">Needs</li>
                    <li class="legend-item">Wants</li>
                    <li class="legend-item">Savings</li>
                </ul>
            </section>
        </section>
        <section id="expenses">
            <section class="needs-tab">
                <h3 class="form-title">Needs - 50%</h3>
                <form class="expenses-section">
                    <label for="exp1">Expense 1</label> 
                    <input type="text" id="exp1" name="exp1">
                    <label for="exp2">Expense 2</label>
                    <input type="text" id="exp2" name="exp2">
                    <label for="exp3">Expense 3</label>
                    <input type="text" id="exp3" name="exp3">
                    <label for="exp4">Expense 4</label>
                    <input type="text" id="exp4" name="exp4">
                    <label for="exp5">Expense 5</label>
                    <input type="text" id="exp5" name="exp5">
                    <label for="exp6">Expense 6</label>
                    <input type="text" id="exp6" name="exp6">
                    <label for="exp7">Expense 7</label>
                    <input type="text" id="exp7" name="exp7">
                    <p class="expense-total">Total:</p>
                </form>
                <ul id="needs"></ul>
            </section>
            <section class="wants-tab">
                <h3 class="form-title">Wants - 30%</h3>
                <form class="expenses-section">
                    <label for="exp1">Expense 1</label>
                    <input type="text" id="exp1" name="exp1">
                    <label for="exp2">Expense 2</label>
                    <input type="text" id="exp2" name="exp2">
                    <label for="exp3">Expense 3</label>
                    <input type="text" id="exp3" name="exp3">
                    <label for="exp4">Expense 4</label>
                    <input type="text" id="exp4" name="exp4">
                    <label for="exp5">Expense 5</label>
                    <input type="text" id="exp5" name="exp5">
                    <label for="exp6">Expense 6</label>
                    <input type="text" id="exp6" name="exp6">
                    <label for="exp7">Expense 7</label>
                    <input type="text" id="exp7" name="exp7">
                    <p class="expense-total">Total:</p>
                </form>
                <ul id="wants"></ul>
            </section>
            <section class="savings-tab">
                <h3 class="form-title">Savings - 20%</h3>
                <form class="expenses-section">
                    <label for="exp1">Expense 1</label>
                    <input type="text" id="exp1" name="exp1">
                    <label for="exp2">Expense 2</label>
                    <input type="text" id="exp2" name="exp2">
                    <label for="exp3">Expense 3</label>
                    <input type="text" id="exp3" name="exp3">
                    <label for="exp4">Expense 4</label>
                    <input type="text" id="exp4" name="exp4">
                    <label for="exp5">Expense 5</label>
                    <input type="text" id="exp5" name="exp5">
                    <label for="exp6">Expense 6</label>
                    <input type="text" id="exp6" name="exp6">
                    <label for="exp7">Expense 7</label>
                    <input type="text" id="exp7" name="exp7">
                    <p class="expense-total">Total:</p>
                </form>
                <ul id="savings"></ul>
            </section>
            <!-- Change name of section later -->
            <section id="add-calc">
                <section class="add-new">
                    <div id="addbutton"></div>
                    <p> Add Expense (Optional)</p>
                    <form>
                        <label for="NewExp">New Expense</label>
                        <input type="text" id="NewExp" id="NewExp" name="NewExp">
                    </form>
                </section>
                <section class="calculations-section">
                    <form>
                        <label for="Needs">Needs:</label>
                        <input type="text" id="Needs" name="Needs"> <br>
                        <label for="Wants">Wants:</label>
                        <input type="text" id="Wants" name="Wants"> <br>
                        <label for="Savings">Savings:</label>
                        <input type="text" id="Savings" name="Savings">
                        <p class="expense-total">Total:</p>
                    </form>
                </section>
            </section>
    </main>
    <script src="app.js"></script>
</body>

</html>
