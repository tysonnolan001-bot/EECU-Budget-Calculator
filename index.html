<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wise-Up Budget Calculator</title>
    <nav><img src="/images/Wise-Up Budget Calculator.png" alt="title of page"></nav>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>


<body>
    <main>
        <section class="income">
            <label for="add-income">Add Gross Income</label>
            <input type="text" id="add-income" name="add-income">
        </section>
        <section class="chart-section">
            <canvas id="myChart"></canvas>
            <script>
                const ctx = document.getElementById('myChart');
              
                new Chart(ctx, {
                  type: 'pie',
                  data: {
                    labels: ['Needs', 'Wants', 'Savings'],
                    datasets: [{
                      label: '# of Expenses Paid',
                      data: [7, 4.2, 2.80],
                      backgroundColor: [
                        '#DF4545',
                        '#76DC61',
                        '#6A71FF'
                      ],
                      borderWidth: 1,
                      borderColor: 'black'
                    }]
                  },
                  options: {
                    scales: {
                      y: {
                        beginAtZero: true
                      }
                    }
                  }
                });
            </script>
            <!-- Add chart later -->
            <!-- <section id="chart-legend">
                <ul id="legend-items">
                    <li class="legend-item1">Needs</li>
                    <li class="legend-item2">Wants</li>
                    <li class="legend-item3">Savings</li>
                </ul>
            </section> -->
        </section>
        <section id="expenses">
            <section class="needs-tab">
                <h3 class="form-title">Needs - 50%</h3>
                <form class="expenses-section">
                    <label for="exp1">Housing</label> 
                    <input type="value" id="exp1">
                    <label for="exp2">Safety</label>
                    <input type="text" id="exp2" name="exp2">
                    <label for="exp3">Mortgage</label>
                    <input type="text" id="exp3" name="exp3">
                    <label for="exp4">Groceries</label>
                    <input type="text" id="exp4" name="exp4">
                    <label for="exp5">Travel</label>
                    <input type="text" id="exp5" name="exp5">
                    <label for="exp6">Utilities</label>
                    <input type="text" id="exp6" name="exp6">
                    <label for="exp7">Insurance</label>
                    <input type="text" id="exp7" name="exp7">
                    <article class="expense-total">
                        <p>Total:</p>
                        <div></div>
                    </article>
                </form>
                <ul id="needs"></ul>
            </section>
            <section class="wants-tab">
                <h3 class="form-title">Wants - 30%</h3>
                <form class="expenses-section">
                    <label for="exp1">Expense 1</label>
                    <input type="text" id="exp1" name="exp1">
                    <label for="exp2">Expense 2</label>
                    <input type="text" id="exp2" name="exp2">
                    <label for="exp3">Expense 3</label>
                    <input type="text" id="exp3" name="exp3">
                    <label for="exp4">Expense 4</label>
                    <input type="text" id="exp4" name="exp4">
                    <label for="exp5">Expense 5</label>
                    <input type="text" id="exp5" name="exp5">
                    <label for="exp6">Expense 6</label>
                    <input type="text" id="exp6" name="exp6">
                    <label for="exp7">Expense 7</label>
                    <input type="text" id="exp7" name="exp7">
                    <article class="expense-total">
                        <p>Total:</p>
                        <div></div>
                    </article>
                </form>
                <ul id="wants"></ul>
            </section>
            <section class="savings-tab">
                <h3 class="form-title">Savings - 20%</h3>
                <form class="expenses-section">
                    <label for="exp1">Expense 1</label>
                    <input type="text" id="exp1" name="exp1">
                    <label for="exp2">Expense 2</label>
                    <input type="text" id="exp2" name="exp2">
                    <label for="exp3">Expense 3</label>
                    <input type="text" id="exp3" name="exp3">
                    <label for="exp4">Expense 4</label>
                    <input type="text" id="exp4" name="exp4">
                    <label for="exp5">Expense 5</label>
                    <input type="text" id="exp5" name="exp5">
                    <label for="exp6">Expense 6</label>
                    <input type="text" id="exp6" name="exp6">
                    <label for="exp7">Expense 7</label>
                    <input type="text" id="exp7" name="exp7">
                    <article class="expense-total">
                        <p>Total:</p>
                        <div></div>
                    </article>
                </form>
                <ul id="savings"></ul>
            </section>
            <!-- Change name of section later -->
            <section id="add-calc">
                <section class="add-new">
                    <article id="add-button">
                        <button> <img src="/images/AddExpense.png"> </button>
                        <p> Add Expense (Optional)</p>
                        </article>
                    <form>
                        <article id="new-expense">
                        <label for="NewExp">New Expense</label>
                        <input type="text" id="NewExp" id="NewExp" name="NewExp">
                        </article>
                    </form>
                </section>
                <section class="calculations-section">
                    <form>
                        <article id="needs-calculation"> <label for="needs">Needs:</label> <input type="text" id="needs-total"> </article>
                        <article id="wants-calculation"> <label for="wants">Wants:</label> <input type="text" id="wants-total"> </article>
                        <article id="savings-calculation"> <label for="savings">Savings:</label> <input type="text" id="savings-total"> </article>
                        <article id="total-calculation"> <label for="total">Total:</label> <input type="text" id="total"> </article>
                    </form>
                </section>
            </section>
    </main>
    <script src="app.js"></script>
</body>

</html>
